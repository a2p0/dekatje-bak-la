# Dev & test : PostgreSQL local (docker compose up -d)
# Prod       : Neon PostgreSQL via DATABASE_URL (Coolify)

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: <%= ENV.fetch("DATABASE_DEVEL_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_DEVEL_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_DEVEL_USERNAME", "dekatje") %>
  password: <%= ENV.fetch("DATABASE_DEVEL_PASSWORD", "dekatje_dev") %>
  database: <%= ENV.fetch("DATABASE_DEVEL_NAME", "dekatje_bak_la_development") %>

test:
  <<: *default
  host: <%= ENV.fetch("DATABASE_TEST_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_TEST_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_TEST_USERNAME", "dekatje") %>
  password: <%= ENV.fetch("DATABASE_TEST_PASSWORD", "dekatje_dev") %>
  database: <%= ENV.fetch("DATABASE_TEST_NAME", "dekatje_bak_la_test") %>

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate
