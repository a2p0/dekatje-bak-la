# Dev & test : PostgreSQL local (docker compose up -d)
# Prod       : Neon PostgreSQL via DATABASE_URL (Coolify)

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  host: <%= ENV.fetch("DATABASE_DEVEL_HOST") %>
  port: <%= ENV.fetch("DATABASE_DEVEL_PORT") %>
  username: <%= ENV.fetch("DATABASE_DEVEL_USERNAME") %>
  password: <%= ENV.fetch("DATABASE_DEVEL_PASSWORD") %>
  database: <%= ENV.fetch("DATABASE_DEVEL_NAME") %>

test:
  <<: *default
  host: <%= ENV.fetch("DATABASE_TEST_HOST") %>
  port: <%= ENV.fetch("DATABASE_TEST_PORT") %>
  username: <%= ENV.fetch("DATABASE_TEST_USERNAME") %>
  password: <%= ENV.fetch("DATABASE_TEST_PASSWORD") %>
  database: <%= ENV.fetch("DATABASE_TEST_NAME") %>

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    migrations_paths: db/cable_migrate
