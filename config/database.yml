# Neon PostgreSQL — deux URLs distinctes (cf. DECISIONS.md D2)
# DATABASE_URL        → poolée PgBouncer (app Rails)
# DATABASE_DIRECT_URL → connexion directe (migrations uniquement)

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  url: <%= ENV["DATABASE_DIRECT_URL"] || ENV["DATABASE_URL"] %>

test:
  <<: *default

production:
  primary: &primary_production
    <<: *default
  cache:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
