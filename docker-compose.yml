services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dekatje
      POSTGRES_PASSWORD: dekatje_dev
      POSTGRES_DB: dekatje_bak_la_development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dekatje"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  pgdata:
