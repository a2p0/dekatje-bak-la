name: Tutor Simulation

on:
  workflow_dispatch:
    inputs:
      subject_id:
        description: "Subject ID to simulate"
        required: true
        type: string
      turns:
        description: "Max conversation turns per question"
        required: false
        default: "5"
        type: string
      profiles:
        description: "Comma-separated profiles (leave empty for all)"
        required: false
        default: ""
        type: string
      questions:
        description: "Comma-separated question numbers (e.g. A.1,A.2 — empty = all)"
        required: false
        default: ""
        type: string
      tutor_model:
        description: "OpenRouter model id for the tutor"
        required: false
        default: "openai/gpt-4o-mini"
        type: string
      student_model:
        description: "OpenRouter model id for the simulated student"
        required: false
        default: "openai/gpt-4o-mini"
        type: string
      judge_model:
        description: "OpenRouter model id for the judge"
        required: false
        default: "anthropic/claude-sonnet-4"
        type: string

jobs:
  simulate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dekatje
          POSTGRES_PASSWORD: dekatje_dev
          POSTGRES_DB: dekatje_bak_la_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://dekatje:dekatje_dev@localhost:5432/dekatje_bak_la_test
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Load schema and seed data
        run: |
          bin/rails db:schema:load
          bin/rails db:seed

      - name: Run tutor simulation
        env:
          TURNS: ${{ inputs.turns }}
          PROFILES: ${{ inputs.profiles }}
          QUESTIONS: ${{ inputs.questions }}
          TUTOR_MODEL: ${{ inputs.tutor_model }}
          STUDENT_MODEL: ${{ inputs.student_model }}
          JUDGE_MODEL: ${{ inputs.judge_model }}
        run: bundle exec rake "tutor:simulate[${{ inputs.subject_id }}]"

      - name: Upload simulation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tutor-simulation-${{ inputs.subject_id }}-${{ github.run_id }}
          path: tmp/tutor_simulations/
          retention-days: 30
