services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: dekatje-bak-la:latest
    ports:
      - "80:80"
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY
      - SECRET_KEY_BASE
      - DATABASE_URL
      - DATABASE_DIRECT_URL
      - REDIS_URL
      - OPENROUTER_API_KEY
      - ENCRYPTION_PRIMARY_KEY
      - ENCRYPTION_DETERMINISTIC_KEY
      - ENCRYPTION_KEY_DERIVATION_SALT
    volumes:
      - storage:/rails/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  sidekiq:
    image: dekatje-bak-la:latest
    command: bundle exec sidekiq
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY
      - SECRET_KEY_BASE
      - DATABASE_URL
      - REDIS_URL
      - OPENROUTER_API_KEY
      - ENCRYPTION_PRIMARY_KEY
      - ENCRYPTION_DETERMINISTIC_KEY
      - ENCRYPTION_KEY_DERIVATION_SALT
    volumes:
      - storage:/rails/storage
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  storage:
