services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY
      - SECRET_KEY_BASE
      - DATABASE_URL
      - DATABASE_DIRECT_URL
      - REDIS_URL
      - OPENROUTER_API_KEY
      - ENCRYPTION_PRIMARY_KEY
      - ENCRYPTION_DETERMINISTIC_KEY
      - ENCRYPTION_KEY_DERIVATION_SALT
    volumes:
      - storage:/rails/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
    command: bundle exec sidekiq
    environment:
      - RAILS_ENV=production
      - RAILS_MASTER_KEY
      - SECRET_KEY_BASE
      - DATABASE_URL
      - REDIS_URL
      - OPENROUTER_API_KEY
      - ENCRYPTION_PRIMARY_KEY
      - ENCRYPTION_DETERMINISTIC_KEY
      - ENCRYPTION_KEY_DERIVATION_SALT
    volumes:
      - storage:/rails/storage

volumes:
  storage:
